# мөңмҙҲ 1нҡҢ kubectl applyлЎң л“ұлЎқн•ҳлҠ” л¶ҖлӘЁ Application.
# мқҙ м•ұмқҙ argocd/apps нҸҙлҚ”мқҳ мһҗмӢқ Applicationл“Өмқ„ кҙҖлҰ¬н•ңлӢӨ.

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: root-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/minmings111/k8s-practice.git
    targetRevision: main
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
