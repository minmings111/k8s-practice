# Argo CD에게 OpenTelemetry Collector Helm chart를 설치하라고 알려주는 Application
# Collector는 앱/인프라에서 발생한 metrics, traces, logs를 받아서 다른 관측 도구로 넘겨주는 수집기 역할을 한다.

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: opentelemetry-collector-app
  namespace: argocd

spec:
  project: default

  # sources를 쓰면 외부 Helm chart와 Git 안의 values 파일을 함께 사용할 수 있다.
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.159.0

      helm:
        releaseName: otel-collector
        valueFiles:
          - $values/apps/monitoring/opentelemetry-collector-values.yaml

    # 위 valueFiles에서 $values로 참조할 Git 저장소
    - repoURL: https://github.com/minmings111/k8s-practice.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
