# Argo CD에게 postgres manifest 위치를 알려주는 자식 Application

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: postgres-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/minmings111/k8s-practice.git
    targetRevision: main
    path: apps/postgres

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
