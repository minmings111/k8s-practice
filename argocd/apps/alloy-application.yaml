# Argo CD에게 Grafana Alloy Helm chart를 설치하라고 알려주는 Application
# Alloy는 Kubernetes 로그를 읽어서 Loki로 보내는 수집기 역할을 한다.

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: alloy-app
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.10.0

      helm:
        releaseName: alloy
        valueFiles:
          - $values/apps/monitoring/alloy-values.yaml

    # 위 valueFiles에서 $values로 참조할 Git 저장소
    - repoURL: https://github.com/minmings111/k8s-practice.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
