# Argo CD에게 Prometheus Helm chart를 설치하라고 알려주는 자식 Application
# nginx/redis/postgres는 Git repo 안의 YAML을 source로 쓰고,
# Prometheus는 prometheus-community Helm repo의 chart를 source로 사용한다.

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: prometheus-app
  namespace: argocd

spec:
  project: default

  # 무엇을 설치할 것인가
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.13.0

    helm:
      releaseName: prometheus
      values: |
        # 로컬 실습에서는 디스크 영속성보다 설치 성공과 구조 확인을 우선함
        server:
          persistentVolume:
            enabled: false
          service:
            type: ClusterIP

        # 처음에는 Prometheus 서버 중심으로 가볍게 보기 위해 부가 컴포넌트 일부를 끔
        alertmanager:
          enabled: false

        prometheus-pushgateway:
          enabled: false

  # 어디에 설치할 것인가
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      # monitoring namespace가 없으면 Argo CD가 먼저 만들어줌
      - CreateNamespace=true
