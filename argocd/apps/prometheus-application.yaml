# Argo CD에게 Prometheus Helm chart를 설치하라고 알려주는 자식 Application
# nginx/redis/postgres는 Git repo 안의 YAML을 source로 쓰고,
# Prometheus는 prometheus-community Helm repo의 chart를 source로 사용한다.

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: prometheus-app
  namespace: argocd

spec:
  project: default

  # sources를 쓰면 외부 Helm chart와 Git 안의 values 파일을 함께 사용할 수 있다.
  sources:
    # 무엇을 설치할 것인가
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 29.13.0

      helm:
        releaseName: prometheus
        valueFiles:
          - $values/apps/monitoring/prometheus-values.yaml

    # 위 valueFiles에서 $values로 참조할 Git 저장소
    - repoURL: https://github.com/minmings111/k8s-practice.git
      targetRevision: main
      ref: values

  # 어디에 설치할 것인가
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      # monitoring namespace가 없으면 Argo CD가 먼저 만들어줌
      - CreateNamespace=true
