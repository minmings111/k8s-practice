apiVersion: v1
kind: Pod

metadata:
  name: postgres-pod
  labels:
    app: postgres

spec:
  # nodeSelectorлҘј м§Җм •н•ҳм§Җ м•Ҡм•„м„ң Kubernetes schedulerк°Җ л…ёл“ңлҘј мһҗмңЁм ҒмңјлЎң м„ нғқн•Ё
  containers:
    - name: postgres-container
      image: postgres:16-alpine
      env:
        - name: POSTGRES_USER
          value: practice
        - name: POSTGRES_PASSWORD
          value: practice-password
        - name: POSTGRES_DB
          value: practice_db
      ports:
        - containerPort: 5432
