# grafana/loki Helm chart에 넘기는 설정값
# Loki는 로그를 저장하고, LogQL로 조회할 수 있게 해주는 저장소다.

# Loki를 read / write / backend로 나누어 실행하는 모드.
# 단일 프로세스보다 실제 운영 구조에 더 가깝고, Loki 내부 컴포넌트를 더 많이 관찰할 수 있다.
deploymentMode: SimpleScalable

loki:
  # 멀티 테넌트 인증을 끄면 Alloy가 별도 X-Scope-OrgID 헤더 없이 Loki로 로그를 보낼 수 있다.
  # 지금 목표는 인증 실습보다 로그 수집 흐름을 먼저 넓게 보는 것이다.
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  # Loki 3.x 계열은 schema 설정이 필요하다.
  # TSDB 저장 방식과 v13 schema를 사용한다.
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  ingester:
    chunk_encoding: snappy

  querier:
    max_concurrent: 2

  # Loki chart가 제공하는 간단한 UI를 /ui 경로로 열 수 있게 한다.
  ui:
    enabled: true

# SimpleScalable 모드에서는 read / write / backend가 Loki 역할을 나누어 맡는다.
read:
  replicas: 1
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3100"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

write:
  replicas: 1
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3100"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicas: 1
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "3100"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# SimpleScalable 모드에서는 singleBinary 컴포넌트는 사용하지 않는다.
singleBinary:
  replicas: 0

# Loki 앞단의 HTTP gateway.
# Alloy와 브라우저 UI는 이 gateway를 통해 Loki에 접근한다.
gateway:
  enabled: true
  service:
    type: ClusterIP

# Loki의 chunk 조회 캐시.
# 로그 저장량 자체를 늘리는 기능은 아니지만, 조회 성능과 내부 관측 포인트가 늘어난다.
chunksCache:
  enabled: true
  allocatedMemory: 128
  allocatedCPU: 100m
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Loki의 쿼리 결과 캐시.
resultsCache:
  enabled: true
  allocatedMemory: 128
  allocatedCPU: 100m
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Loki의 S3 호환 저장소로 MinIO를 같이 띄운다.
# 클라우드 S3 없이도 Loki의 object storage 구성을 연습할 수 있다.
minio:
  enabled: true
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# SimpleScalable 모드에서는 아래 역할들이 read / write / backend 안에 포함되어 동작한다.
# 별도 Pod로 분리하는 것은 Microservices 모드에서 다룬다.
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Loki canary는 테스트 로그를 계속 보내서 Loki가 정상으로 받고 조회되는지 확인한다.
lokiCanary:
  enabled: true
  push: true
