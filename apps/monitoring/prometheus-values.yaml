# prometheus-community/prometheus Helm chart에 넘기는 설정값
# Application YAML은 "무엇을 설치할지"만 들고,
# 이 파일은 "어떤 옵션으로 설치할지"를 담당한다.

# Prometheus 서버 본체.
# Kubernetes 안의 여러 /metrics endpoint를 scrape하고, 수집한 시계열 데이터를 저장한다.
server:
  persistentVolume:
    # 수집한 메트릭을 Pod 재시작 후에도 유지하기 위해 PVC를 사용한다.
    # Docker Desktop kind 환경에서는 local-path-storage가 기본 동적 볼륨을 만들어준다.
    enabled: true
  service:
    type: ClusterIP

# Kubernetes 리소스 상태를 메트릭으로 바꿔주는 컴포넌트.
# 예: kube_pod_info, kube_namespace_status_phase, kube_node_info
kube-state-metrics:
  enabled: true

# 각 노드의 CPU, 메모리, 디스크, 네트워크 정보를 메트릭으로 노출하는 컴포넌트.
# DaemonSet으로 동작해서 노드마다 하나씩 떠 있다.
prometheus-node-exporter:
  enabled: true

# Prometheus의 알림 담당 컴포넌트.
# Prometheus가 만든 alert를 받아서 Slack, Email 같은 외부 채널로 보낼 때 사용한다.
alertmanager:
  enabled: true
  persistence:
    enabled: true

# 짧게 실행되고 종료되는 batch job이 메트릭을 잠깐 밀어넣을 때 사용하는 컴포넌트.
# 일반 앱은 보통 Prometheus가 pull로 가져가지만, batch job은 pushgateway를 거쳐 전달하기도 한다.
prometheus-pushgateway:
  enabled: true
