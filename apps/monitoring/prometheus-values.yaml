# prometheus-community/prometheus Helm chart에 넘기는 설정값
# Application YAML은 "무엇을 설치할지"만 들고,
# 이 파일은 "어떤 옵션으로 설치할지"를 담당한다.

# 로컬 실습에서는 디스크 영속성보다 설치 성공과 구조 확인을 우선함
server:
  persistentVolume:
    enabled: false
  service:
    type: ClusterIP

# 처음에는 Prometheus 서버 중심으로 가볍게 보기 위해 부가 컴포넌트 일부를 끔
alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false
