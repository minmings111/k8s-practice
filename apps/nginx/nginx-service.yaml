apiVersion: v1 # Service도 Kubernetes 기본 리소스라서 v1을 사용
kind: Service # Pod에 안정적으로 접근할 수 있는 고정 주소를 만들어주는 리소스

metadata:
  name: nginx-service
  namespace: web # nginx-pod가 있는 namespace와 동일해야 selector로 Pod를 찾을 수 있음

spec:
  type: ClusterIP # 클러스터 내부에서만 접근 가능한 기본 Service 타입

  # 이 Service가 트래픽을 보낼 Pod를 label로 찾음
  # nginx-pod의 metadata.labels.app 값과 맞아야 함
  selector:
    app: nginx

  ports:
    # Service가 열어주는 포트
    - port: 80

      # 실제 nginx 컨테이너가 열고 있는 포트
      targetPort: 80
